{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-lg-8">
        <h1 class="text-white">
            <i class="fas fa-plus-circle"></i> Nova Despesa
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Registre uma nova despesa de TI</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select class="form-select" name="categoria" required>
                            <option value="">-- Selecione --</option>
                            <option value="software">Software</option>
                            <option value="hardware">Hardware</option>
                            <option value="nuvem">Nuvem</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" class="form-control" name="valor" placeholder="0.00" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" class="form-control" name="data" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" class="form-control" name="descricao" placeholder="Ex: Licença de software XYZ">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Orçamento Anual (R$)</label>
                        <input type="number" step="0.01" class="form-control" name="orcamento_anual" placeholder="0.00" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Adicionar Despesa
                        </button>
                        <a href="/despesas" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
