{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-lg-8">
        <h1 class="text-white">
            <i class="fas fa-plus-circle"></i> Nova Licença
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Preencha os dados da licença</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome da Licença</label>
                        <input type="text" class="form-control" name="nome" placeholder="Ex: Office 365" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data de Vencimento</label>
                        <input type="date" class="form-control" name="data_vencimento" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Custo Anual (R$)</label>
                        <input type="number" step="0.01" class="form-control" name="custo" placeholder="0.00" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" required>
                            <option value="ativa">Ativa</option>
                            <option value="expirada">Expirada</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Salvar Licença
                        </button>
                        <a href="/licencas" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
