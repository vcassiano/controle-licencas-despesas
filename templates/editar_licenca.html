{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-lg-8">
        <h1 class="text-white">
            <i class="fas fa-edit"></i> Editar Licença
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Atualize os dados da licença</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome da Licença</label>
                        <input type="text" class="form-control" name="nome" value="{{ licenca.nome }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data de Vencimento</label>
                        <input type="date" class="form-control" name="data_vencimento" value="{{ licenca.data_vencimento.strftime('%Y-%m-%d') }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Custo Anual (R$)</label>
                        <input type="number" step="0.01" class="form-control" name="custo" value="{{ licenca.custo }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" required>
                            <option value="ativa" {% if licenca.status == 'ativa' %}selected{% endif %}>Ativa</option>
                            <option value="expirada" {% if licenca.status == 'expirada' %}selected{% endif %}>Expirada</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Atualizar Licença
                        </button>
                        <a href="/licencas" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
