<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fundo circular -->
  <circle cx="100" cy="100" r="95" fill="#00A651" opacity="0.1" stroke="#00A651" stroke-width="2"/>
  
  <!-- "G" estilizado -->
  <g transform="translate(50, 40)">
    <!-- Barra horizontal superior -->
    <rect x="10" y="10" width="90" height="12" fill="#00A651" rx="6"/>
    
    <!-- Barra vertical esquerda -->
    <rect x="10" y="10" width="12" height="90" fill="#00A651" rx="6"/>
    
    <!-- Barra horizontal inferior -->
    <rect x="10" y="88" width="90" height="12" fill="#00A651" rx="6"/>
    
    <!-- Barra vertical direita (apenas parte superior) -->
    <rect x="88" y="10" width="12" height="50" fill="#00A651" rx="6"/>
    
    <!-- Barra interna horizontal -->
    <rect x="30" y="55" width="60" height="12" fill="#00A651" rx="6"/>
    
    <!-- Parte inferior externa direita -->
    <rect x="88" y="67" width="12" height="33" fill="#00A651" rx="6"/>
  </g>
  
  <!-- Folha decorativa ao lado -->
  <g transform="translate(130, 60)">
    <!-- Folha -->
    <ellipse cx="0" cy="0" rx="20" ry="30" fill="none" stroke="#00D084" stroke-width="3" transform="rotate(45)"/>
    <!-- Nervura central -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#00D084" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Borda externa -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00A651" stroke-width="3" opacity="0.3"/>
  
  <!-- Efeito de brilho -->
  <circle cx="70" cy="70" r="30" fill="white" opacity="0.1" filter="url(#blur)"/>
</svg>